<!doctype html>
<html lang="da">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sommerduel</title>
    <link rel="preconnect" href="https://api.airtable.com">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <p class="eyebrow">KH Sommer OL</p>
        <h1>Trænere mod spillere</h1>
      </div>
      <div class="top-actions">
        <a class="primary-link" href="#registrering">Registrer aktivitet</a>
        <button class="icon-button" id="refresh-button" type="button" aria-label="Opdater resultater" title="Opdater resultater">
          <span aria-hidden="true">↻</span>
        </button>
      </div>
    </header>

    <main>
      <section class="scoreboard" aria-labelledby="score-title">
        <div class="score-head">
          <div>
            <p class="eyebrow">Live stilling</p>
            <h2 id="score-title">Hvor langt er holdene?</h2>
          </div>
          <div class="status-pill" id="sync-status" role="status">Klar</div>
        </div>

        <div class="paths" aria-label="Holdenes placering på ruten">
          <article class="team-path trainer">
            <h3>Trænere</h3>
            <div class="path" aria-label="Trænernes rute">
              <div class="path-line"></div>
              <div class="path-fill" id="trainer-progress"></div>
              <div class="path-marker" id="trainer-runner">
                <span class="marker-dot" aria-hidden="true"></span>
                <span class="marker-label"><strong id="trainer-score">0</strong> point</span>
              </div>
            </div>
          </article>

          <article class="team-path player">
            <h3>Spillere</h3>
            <div class="path" aria-label="Spillernes rute">
              <div class="path-line"></div>
              <div class="path-fill" id="player-progress"></div>
              <div class="path-marker" id="player-runner">
                <span class="marker-dot" aria-hidden="true"></span>
                <span class="marker-label"><strong id="player-score">0</strong> point</span>
              </div>
            </div>
          </article>
        </div>
      </section>

      <section class="form-section" id="registrering" aria-labelledby="form-title">
        <form class="entry-panel" id="entry-form">
          <div class="section-title">
            <p class="eyebrow">Registrering</p>
            <h2 id="form-title">Tilføj din aktivitet</h2>
          </div>

          <label>
            <span>Hvem er du?</span>
            <select id="member-input" required>
              <option value="">Henter deltagere...</option>
            </select>
          </label>

          <label>
            <span>Dato</span>
            <input id="date-input" type="date" required>
          </label>

          <label>
            <span>Aktivitet</span>
            <select id="activity-input" required>
              <option value="Løb">Løb</option>
              <option value="Armbøjninger">Armbøjninger</option>
              <option value="Mavebøjninger">Mavebøjninger</option>
              <option value="Squats">Squats</option>
            </select>
          </label>

          <label>
            <span>Antal gange</span>
            <input id="quantity-input" type="number" min="1" step="1" inputmode="numeric" required>
          </label>

          <button class="primary-button" id="submit-button" type="submit">Send ind</button>
          <p class="form-message" id="form-message"></p>
        </form>
      </section>
    </main>

    <dialog id="setup-dialog">
      <form method="dialog" class="setup-panel">
        <h2>Airtable token mangler</h2>
        <p>Indsæt et Personal Access Token i <code>app.js</code>, eller gem et token lokalt i denne browser.</p>
        <label>
          <span>Token</span>
          <input id="token-input" type="password" autocomplete="off" placeholder="pat...">
        </label>
        <div class="dialog-actions">
          <button class="secondary-button" value="cancel" type="submit">Luk</button>
          <button class="primary-button" id="save-token-button" value="default" type="button">Gem lokalt</button>
        </div>
      </form>
    </dialog>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
