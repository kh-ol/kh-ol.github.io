<!doctype html>
<html lang="da">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sommerduel</title>
    <link rel="preconnect" href="https://api.airtable.com">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="top-actions">
        <a class="primary-link" href="/register.html">Registrer aktivitet</a>
      </div>
    </header>

    <main>
      <section class="scoreboard" aria-label="Konkurrencestilling">
        <div class="score-controls">
          <select id="score-filter" aria-label="Vælg konkurrencevisning">
            <option value="all">Samlet konkurrence</option>
            <option value="Løb">Løb</option>
            <option value="Armbøjninger">Armbøjninger</option>
            <option value="Mavebøjninger">Mavebøjninger</option>
            <option value="Squats">Squats</option>
          </select>
        </div>

        <div class="paths" aria-label="Holdenes placering på ruten">
          <article class="team-path trainer">
            <h3>
              <span>Trænere</span>
              <span class="team-score"><strong id="trainer-score">0</strong><span id="trainer-unit">stk.</span></span>
            </h3>
            <div class="path" aria-label="Trænernes rute">
              <svg class="path-map" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
                <path class="path-line" pathLength="1" d="M50 3 C22 15 78 27 50 39 C22 51 78 63 50 75 C34 84 44 92 50 97"></path>
                <path class="path-fill" id="trainer-progress" pathLength="1" d="M50 3 C22 15 78 27 50 39 C22 51 78 63 50 75 C34 84 44 92 50 97"></path>
              </svg>
              <div class="goal-badge" id="trainer-goal">20.000 stk.</div>
            </div>
          </article>

          <article class="team-path player">
            <h3>
              <span>Spillere</span>
              <span class="team-score"><strong id="player-score">0</strong><span id="player-unit">stk.</span></span>
            </h3>
            <div class="path" aria-label="Spillernes rute">
              <svg class="path-map" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
                <path class="path-line" pathLength="1" d="M50 3 C22 15 78 27 50 39 C22 51 78 63 50 75 C34 84 44 92 50 97"></path>
                <path class="path-fill" id="player-progress" pathLength="1" d="M50 3 C22 15 78 27 50 39 C22 51 78 63 50 75 C34 84 44 92 50 97"></path>
              </svg>
              <div class="goal-badge" id="player-goal">20.000 stk.</div>
            </div>
          </article>
        </div>
      </section>
    </main>

    <dialog id="setup-dialog">
      <form method="dialog" class="setup-panel">
        <h2>Airtable token mangler</h2>
        <p>Indsæt et Personal Access Token i <code>app.js</code>, eller gem et token lokalt i denne browser.</p>
        <label>
          <span>Token</span>
          <input id="token-input" type="password" autocomplete="off" placeholder="pat...">
        </label>
        <div class="dialog-actions">
          <button class="secondary-button" value="cancel" type="submit">Luk</button>
          <button class="primary-button" id="save-token-button" value="default" type="button">Gem lokalt</button>
        </div>
      </form>
    </dialog>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
